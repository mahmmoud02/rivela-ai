<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Rivela AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
<div class="login-page">
    <div class="login-card">

        <div class="brand-wrap">
            <div class="lung-icon">
                <div class="scan-glow"></div>
                <div class="scan-line"></div>
                <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
                    <line x1="11" y1="2" x2="11" y2="6" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M11 6 C11 6 8 7 8 9" stroke="#2DD4BF" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                    <path d="M11 6 C11 6 14 7 14 9" stroke="#2DD4BF" stroke-width="1.3" stroke-linecap="round" fill="none"/>
                    <path d="M8 9 C5.5 9.5 4.5 11.5 4.5 14 C4.5 17 6 19 8 19.5 C9.5 20 11 19 11 19" stroke="#2DD4BF" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                    <path d="M14 9 C16.5 9.5 17.5 11.5 17.5 14 C17.5 17 16 19 14 19.5 C12.5 20 11 19 11 19" stroke="#2DD4BF" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                </svg>
            </div>
            <div class="wordmark">
                <span class="wordmark-name">Rivela</span>
                <span class="wordmark-ai">AI</span>
            </div>
        </div>

        <div class="login-label" style="margin-top:1.75rem;">Sign in</div>
        <h2>Welcome back</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}<div class="flash">{{ msg }}</div>{% endfor %}
        {% endif %}
        {% endwith %}

        <form method="post" style="margin-top:1.5rem;">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn"
                    style="width:100%; justify-content:center; padding:0.62rem 1rem; font-size:0.9rem; margin-top:0.5rem;">
                Sign in →
            </button>
        </form>

    </div>
</div>
</body>
</html>
